name: Build OpenClaw Desktop

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: '10.15'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenClaw Desktop ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Retry macOS DMG if missing
        if: matrix.platform == 'macos-14' && steps.tauri_build.outcome == 'success'
        shell: bash
        run: |
          DMG_COUNT=$(find src-tauri/target -name "*.dmg" -type f 2>/dev/null | wc -l)
          if [ "$DMG_COUNT" -eq 0 ]; then
            echo "⚠️  No DMG found after build, retrying bundle creation..."
            cd src-tauri
            cargo install tauri-cli --version "^2" --locked 2>/dev/null || true
            cargo tauri build --target universal-apple-darwin --bundles dmg 2>&1 || {
              echo "❌ DMG retry also failed"
              exit 1
            }
          else
            echo "✅ DMG found ($DMG_COUNT file(s))"
          fi

      - name: Verify build artifacts
        if: always()
        shell: bash
        run: |
          echo "=== Artifact Verification ==="
          PLATFORM="${{ matrix.platform }}"
          case "$PLATFORM" in
            macos-14)
              find src-tauri/target -name "*.dmg" -type f -exec sh -c 'echo "✅ DMG: {} ($(du -h "{}" | cut -f1))"' \;
              ;;
            ubuntu-22.04)
              find src-tauri/target \( -name "*.AppImage" -o -name "*.deb" \) -type f -exec sh -c 'echo "✅ {}"' \;
              ;;
            windows-latest)
              find src-tauri/target \( -name "*.msi" -o -name "*.exe" \) -type f -exec sh -c 'echo "✅ {}"' \;
              ;;
          esac

      - name: Debug produced bundles
        if: always()
        shell: bash
        run: |
          echo "Platform: ${{ matrix.platform }}"
          echo "Listing src-tauri/target/release/bundle"
          ls -la src-tauri/target/release/bundle || true
          echo "Find bundle files"
          find src-tauri/target/release -maxdepth 5 -type f \
            \( -name "*.dmg" -o -name "*.app" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.msi" -o -name "*.exe" \) \
            -print || true

  # Quick check job for PRs
  check:
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Check Rust code
        run: cd src-tauri && cargo check

      - name: Build frontend
        run: npm run build
